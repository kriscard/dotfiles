# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
# Catppuccin Macchiato theme for lazygit
gui:
  border: rounded
  showCommandLog: false
  nerdFontsVersion: "3"
  showDivergenceFromBaseBranch: arrowAndNumber
  filterMode: fuzzy
  showFileTree: true
  showNumstatInFilesView: true
  showBranchCommitHash: true
  animateExplosion: true
  scrollOffMargin: 5
  scrollOffBehavior: margin
  # Catppuccin Macchiato — mauve accent (official theme)
  # https://github.com/catppuccin/lazygit/blob/main/themes/macchiato/mauve.yml
  theme:
    activeBorderColor:
      - "#c6a0f6"  # mauve
      - bold
    inactiveBorderColor:
      - "#a5adcb"  # subtext0
    searchingActiveBorderColor:
      - "#eed49f"  # yellow
    optionsTextColor:
      - "#8aadf4"  # blue
    selectedLineBgColor:
      - "#363a4f"  # surface0
    inactiveViewSelectedLineBgColor:
      - "#6e738d"  # overlay0
    cherryPickedCommitFgColor:
      - "#c6a0f6"  # mauve
    cherryPickedCommitBgColor:
      - "#494d64"  # surface1
    markedBaseCommitFgColor:
      - "#8aadf4"  # blue
    markedBaseCommitBgColor:
      - "#eed49f"  # yellow
    unstagedChangesColor:
      - "#ed8796"  # red
    defaultFgColor:
      - "#cad3f5"  # text
  authorColors:
    "*": "#b7bdf8"  # lavender
git:
  pagers:
    - pager: delta --paging=never
      colorArg: always
  autoFetch: true
  autoRefresh: true
  mainBranches:
    - main
    - master
    - develop
  autoForwardBranches: onlyMainBranches
  parseEmoji: true
  commit:
    autoWrapCommitMessage: true
    autoWrapWidth: 72
  log:
    order: topo-order
    showGraph: always
os:
  editPreset: "nvim"
  shellFunctionsFile: ~/.dotfiles/zsh/zsh.d/70-functions.zsh
keybinding:
  universal:
    # Tmux pane navigation (use actual tmux commands, not Neovim commands)
    prevBlock-alt: "<c-h>"
    nextBlock-alt: "<c-l>"
customCommands:
  - key: "<c-h>"
    command: "tmux select-pane -L"
    context: "global"
    output: terminal
  - key: "<c-l>"
    command: "tmux select-pane -R"
    context: "global"
    output: terminal
  - key: "<c-j>"
    command: "tmux select-pane -D"
    context: "global"
    output: terminal
  - key: "<c-k>"
    command: "tmux select-pane -U"
    context: "global"
    output: terminal
